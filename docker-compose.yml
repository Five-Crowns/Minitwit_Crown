services:
  app:
    image: ${DOCKER_USERNAME}/minitwitimage
    container_name: minitwit
    environment:
      - RAILS_ENV=production
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_HOST=${POSTGRES_HOST_REMOTE}
      - POSTGRES_PORT=5432
    ports:
      - '5000:5000'
    networks:
      - main
    command: >
      bash -c "sleep 10 && bundle exec rake db:create db:migrate && bundle exec
      ruby minitwit.rb -o 0.0.0.0"

  cadvisor:
    image: gcr.io/cadvisor/cadvisor
    ports:
      - '8080:8080'
    networks:
      - main

  grafana:
    image: grafana/grafana:10.2.4
    depends_on:
      - prometheus
    volumes:
      - grafana_data:/var/lib/grafana # Persist dashboards & settings
      - ./grafana/provisioning/datasources:/etc/grafana/provisioning/datasources
      - ./grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards
    ports:
      - '3000:3000'
    networks:
      - main
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    depends_on:
      - app
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - '9090:9090'
    networks:
      - main
networks:
  main:


volumes:
  grafana_data:
