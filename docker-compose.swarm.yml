version: '3.8'
networks:
  main:
    driver: overlay
services:
  app:
    image: minitwitimage
    ports:
      - "5000:5000"
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_HOST=${POSTGRES_HOST}
      - POSTGRES_PORT=5432
      # Add this to force TCP connection instead of socket
      - DATABASE_URL=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:5432/${POSTGRES_DB}
    command: >
      bash -c "sleep 10 && bundle exec rake db:create db:migrate && bundle exec ruby minitwit.rb -o 0.0.0.0"
    networks:
      - main
    deploy:
      replicas: 1
      update_config:
        delay: 10s
        order: start-first

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    networks:
      - main
    ports:
      - "9090:9090"
    deploy:
      replicas: 1
      placement:
        constraints:
          - "node.role==manager"
      update_config:
        delay: 10s
        order: start-first
    depends_on:
      - app

  cadvisor:
    image: gcr.io/cadvisor/cadvisor
    ports:
      - "8080:8080"
    networks:
      - main
    deploy:
      replicas: 1
      placement:
        constraints:
          - "node.role==worker"
      update_config:
        delay: 10s
        order: start-first

  grafana:
    image: grafana/grafana:10.2.4
    ports:
      - "3000:3000"
    networks:
      - main
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning/datasources:/etc/grafana/provisioning/datasources
      - ./grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards
    deploy:
      replicas: 1
      placement:
        constraints:
          - "node.role==manager"
      update_config:
        delay: 10s
        order: start-first
    depends_on:
      - prometheus

volumes:
  grafana_data: